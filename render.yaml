services:
  - type: web
    name: ai-travel-planner-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        value: "" # Leave empty for in-memory DB or paste your MongoDB Atlas URI
      - key: GEMINI_API_KEY
        value: "" # Add your Gemini API key if using live AI
